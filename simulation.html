<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurnTrack | Vue Publique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #07090c;
            --bg-panel: rgba(15, 18, 25, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --neon-orange: #ff5e00;
            --neon-red: #ff2a00;
            --text-main: #f0f4f8;
            --text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        nav {
            height: 60px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 100;
        }
        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo img {
            height: 28px;
            width: auto;
            filter: drop-shadow(0 0 6px rgba(255,94,0,0.4));
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        /* Main Viewport */
        .viewport {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
        }

        .hud-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hud-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .hud-item i { color: var(--text-muted); }
        .hud-item .val { font-weight: 700; font-family: 'Outfit', sans-serif; }
        .hud-item .val.fire { color: var(--neon-red); }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .canvas-container canvas {
            position: absolute;
            transform-origin: center center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #riskCanvas { z-index: 1; }
        #fireCanvas { z-index: 2; pointer-events: none; }
        #dotCanvas { z-index: 3; pointer-events: none; }

        .overlay-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
            pointer-events: none;
            z-index: 10;
        }
        .overlay-msg i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="brand-logo"><img src="assets/logo.png" alt="BurnTrack"> BurnTrack <span style="font-size:0.8rem; color:var(--text-muted); font-weight:400;">LIVE VIEW</span></a>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="badge" style="font-size:0.75rem; color:var(--neon-red); font-weight:600;"><i class="fa-solid fa-circle"></i> OFFLINE</span>
            <a href="login.html" class="btn-outline"><i class="fa-solid fa-lock"></i> Admin</a>
        </div>
    </nav>

    <div class="viewport">
        <div class="hud-top">
            <div class="hud-panel">
                <div class="hud-item"><i class="fa-regular fa-clock"></i> <span class="val" id="statTime">0.0 min</span></div>
                <div class="hud-item"><i class="fa-solid fa-fire"></i> <span class="val fire" id="statBurning">0</span></div>
                <div class="hud-item"><i class="fa-solid fa-chart-pie"></i> <span class="val" id="statBurned" style="color:var(--neon-orange)">0%</span></div>
                <div class="hud-item"><i class="fa-solid fa-wind"></i> <span class="val" id="statRos">0 m/min</span></div>
            </div>
        </div>

        <div class="canvas-container" id="canvasWrap">
            <div class="overlay-msg" id="canvasMsg">
                <i class="fa-solid fa-tower-broadcast"></i>
                <h3>En attente de diffusion</h3>
                <p>L'administrateur n'a pas encore lancé de simulation.</p>
            </div>
            <canvas id="riskCanvas"></canvas>
            <canvas id="fireCanvas"></canvas>
            <canvas id="dotCanvas"></canvas>
        </div>
    </div>

    <script>
        const WS_URL = localStorage.getItem("burntrack_ws_url") || "ws://localhost:8765/ws";
        let ws = null;
        let riskGrid = null, stateGrid = null, bkMeta = null, isCustomMode = false;

        const riskCanvas = document.getElementById("riskCanvas");
        const fireCanvas = document.getElementById("fireCanvas");
        const dotCanvas = document.getElementById("dotCanvas");
        const riskCtx = riskCanvas.getContext("2d");
        const fireCtx = fireCanvas.getContext("2d");
        const dotCtx = dotCanvas.getContext("2d");
        let cellPx = 5;

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                document.getElementById("badge").style.color = "var(--success)";
                document.getElementById("badge").innerHTML = '<i class="fa-solid fa-circle"></i> LIVE';
            };
            ws.onclose = () => {
                document.getElementById("badge").style.color = "var(--neon-red)";
                document.getElementById("badge").innerHTML = '<i class="fa-solid fa-circle"></i> OFFLINE';
                setTimeout(connect, 3000);
            };
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if(msg.type === "bouskoura_loaded") {
                        bkMeta = msg.meta; riskGrid = msg.risk_grid; isCustomMode = false;
                        document.getElementById("canvasMsg").style.display = "none";
                        resizeCanvases(); drawRiskHeatmap();
                    }
                    else if(msg.type === "configured") {
                        bkMeta = msg; riskGrid = null; isCustomMode = true;
                        document.getElementById("canvasMsg").style.display = "none";
                        resizeCanvases(); drawPlainBackground();
                    }
                    else if(msg.type === "frame") {
                        if(!bkMeta && msg.grid) {
                            // Si le client se connecte au milieu d'une sim, on estime la taille
                            bkMeta = {rows: msg.grid.length, cols: msg.grid[0].length};
                            isCustomMode = true;
                            document.getElementById("canvasMsg").style.display = "none";
                            resizeCanvases(); drawPlainBackground();
                        }
                        stateGrid = msg.grid;
                        drawFireOverlay();
                        const stats = msg.stats || {};
                        document.getElementById("statTime").textContent = (msg.time_min||0).toFixed(1) + " min";
                        document.getElementById("statBurning").textContent = stats.burning || 0;
                        document.getElementById("statBurned").textContent = ((stats.burned_frac||0)*100).toFixed(1) + "%";
                        document.getElementById("statRos").textContent = (stats.ros_avg||0).toFixed(1) + " m/min";
                    }
                    else if(msg.type === "simulation_end") {
                        // Do nothing specific, just let the fire sit
                    }
                } catch(err) {}
            };
        }

        function resizeCanvases() {
            if(!bkMeta) return;
            const wrap = document.getElementById("canvasWrap");
            const W = wrap.clientWidth - 40, H = wrap.clientHeight - 40;
            const rows = bkMeta.rows, cols = bkMeta.cols;
            cellPx = Math.max(1, Math.min(W/cols, H/rows));
            const cw = Math.floor(cols * cellPx), ch = Math.floor(rows * cellPx);
            [riskCanvas, fireCanvas, dotCanvas].forEach(c => {
                c.width = cw; c.height = ch;
            });
        }

        function drawRiskHeatmap() {
            if(!riskGrid) return;
            const rows = riskGrid.length, cols = riskGrid[0].length;
            const iw = riskCanvas.width, ih = riskCanvas.height;
            const img = riskCtx.createImageData(iw, ih);
            const d = img.data;
            const cp = cellPx;
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const score = riskGrid[r][c];
                    let rgb = [8,12,16];
                    if(score>0 && score<0.25) rgb=[26,58,26];
                    else if(score>=0.25 && score<0.45) rgb=[90,72,10];
                    else if(score>=0.45 && score<0.65) rgb=[160,55,0];
                    else if(score>=0.65) rgb=[210,20,0];
                    
                    let px0=Math.floor(c*cp), py0=Math.floor(r*cp);
                    let px1=Math.floor((c+1)*cp), py1=Math.floor((r+1)*cp);
                    for(let y=py0; y<py1; y++) {
                        for(let x=px0; x<px1; x++) {
                            const idx = (y*iw + x)*4;
                            d[idx]=rgb[0]; d[idx+1]=rgb[1]; d[idx+2]=rgb[2]; d[idx+3]=255;
                        }
                    }
                }
            }
            riskCtx.putImageData(img, 0, 0);
        }

        function drawPlainBackground() {
            riskCtx.fillStyle = "#1a1e24";
            riskCtx.fillRect(0, 0, riskCanvas.width, riskCanvas.height);
            riskCtx.strokeStyle = "rgba(255,255,255,0.05)";
            riskCtx.lineWidth = 1;
            riskCtx.beginPath();
            for(let c=0; c<=bkMeta.cols; c++) { riskCtx.moveTo(c*cellPx, 0); riskCtx.lineTo(c*cellPx, riskCanvas.height); }
            for(let r=0; r<=bkMeta.rows; r++) { riskCtx.moveTo(0, r*cellPx); riskCtx.lineTo(riskCanvas.width, r*cellPx); }
            riskCtx.stroke();
        }

        function drawFireOverlay() {
            if(!stateGrid) return;
            fireCtx.clearRect(0,0,fireCanvas.width,fireCanvas.height);
            const rows = stateGrid.length, cols = stateGrid[0].length;
            const cp = cellPx;
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    const s = stateGrid[r][c];
                    if(s===0 || s===3) continue;
                    const x = c*cp, y = r*cp, w = Math.max(1,cp), h = Math.max(1,cp);
                    if(s===1) { fireCtx.fillStyle="#ff5e00"; fireCtx.fillRect(x,y,w,h); }
                    else if(s===2) { fireCtx.fillStyle="#222"; fireCtx.fillRect(x,y,w,h); }
                }
            }
        }

        window.addEventListener("resize", () => {
            resizeCanvases();
            if(riskGrid) drawRiskHeatmap(); else if(isCustomMode) drawPlainBackground();
            drawFireOverlay();
        });

        connect();
    </script>
    <script src="particles.js"></script>
</body>
</html>
